<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Supply Chain Network Explorer</title>

  <script type="module" src="https://js.arcgis.com/5.0/"></script>

  <style>
    :root {
      --app-brand: #38bdf8;
      --app-brand-hover: #0ea5e9;
      --app-bg: #0f172a;
    }

    html, body {
      padding: 0; margin: 0; width: 100vw; height: 100vh;
      background: var(--app-bg);
      --calcite-color-brand: var(--app-brand);
      --calcite-color-brand-hover: var(--app-brand-hover);
      --calcite-color-focus: var(--app-brand);
    }

    calcite-shell { height: 100vh; }

    /* ── Map fills top area ── */
    #map-container { width: 100%; height: 100%; display: flex; }
    arcgis-map { width: 100%; height: 100%; }

    /* ── Bottom shell panel for link chart ── */
    #bottom-shell-panel {
      width: 100%; height: 0;
      --calcite-shell-panel-min-height: 50vh;
      transition: height 0.3s ease;
    }
    #bottom-shell-panel.open { height: 55vh; }

    /* ── Link chart map (graph canvas) ── */
    #link-chart-map {
      width: 100%; height: 100%;
      background: #0f172a;
    }

    /* ── Algo results toast ── */
    #algo-results {
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 10; max-width: 500px;
    }

    /* ── Override map background for the graph canvas ── */
    #link-chart-map .esri-view-surface canvas {
      background: #0f172a !important;
    }
  </style>
</head>

<body class="calcite-mode-dark">
  <calcite-shell>
    <!-- ═══ Header ═══ -->
    <calcite-navigation slot="header">
      <calcite-navigation-logo
        slot="logo"
        heading="Supply Chain Network Explorer"
        description="ArcGIS Components + Link Chart Pattern"
        icon="link-chart"
      ></calcite-navigation-logo>
      <calcite-action-pad slot="content-end" layout="horizontal" expand-disabled>
        <calcite-action id="btn-toggle-routes" text="Toggle Routes" icon="line" scale="s"></calcite-action>
        <calcite-action id="btn-reset-all" text="Reset All" icon="reset" scale="s"></calcite-action>
      </calcite-action-pad>
    </calcite-navigation>

    <!-- ═══ Left Sidebar ═══ -->
    <calcite-shell-panel slot="panel-start" position="start" display-mode="float" width-scale="m">
      <calcite-panel heading="Network Controls">

        <!-- Stats Block -->
        <calcite-block heading="Network Stats" description="Global supply chain metrics" open icon-start="graph-bar">
          <calcite-list selection-mode="none">
            <calcite-list-item label="Nodes" description="21 locations across 5 types" value="nodes">
              <calcite-chip slot="content-end" scale="s" kind="brand" id="chip-nodes">21</calcite-chip>
            </calcite-list-item>
            <calcite-list-item label="Edges" description="27 supply connections" value="edges">
              <calcite-chip slot="content-end" scale="s" kind="brand" id="chip-edges">27</calcite-chip>
            </calcite-list-item>
            <calcite-list-item label="Density" description="Network connectivity ratio" value="density">
              <calcite-chip slot="content-end" scale="s" kind="brand" id="chip-density">0.000</calcite-chip>
            </calcite-list-item>
          </calcite-list>
        </calcite-block>

        <!-- Graph Algorithms Block -->
        <calcite-block heading="Algorithms" description="Analyze network topology" open icon-start="analysis">
          <calcite-list id="algo-list" selection-mode="single-persist">
            <calcite-list-item label="Degree Centrality" description="Size by connection count" value="degree">
              <calcite-icon slot="content-end" icon="number-circle-1" scale="s"></calcite-icon>
            </calcite-list-item>
            <calcite-list-item label="PageRank" description="Size by iterative importance" value="pagerank">
              <calcite-icon slot="content-end" icon="number-circle-2" scale="s"></calcite-icon>
            </calcite-list-item>
            <calcite-list-item label="Betweenness" description="Size by bridge importance" value="betweenness">
              <calcite-icon slot="content-end" icon="number-circle-3" scale="s"></calcite-icon>
            </calcite-list-item>
            <calcite-list-item label="Communities" description="Color by detected clusters" value="community">
              <calcite-icon slot="content-end" icon="group" scale="s"></calcite-icon>
            </calcite-list-item>
            <calcite-list-item label="Shortest Path" description="Find path between 2 selected nodes" value="shortest">
              <calcite-icon slot="content-end" icon="road-sign" scale="s"></calcite-icon>
            </calcite-list-item>
          </calcite-list>
        </calcite-block>

        <!-- Node Inspector Block -->
        <calcite-block heading="Node Inspector" description="Click a node to inspect" id="inspector-block" icon-start="information" collapsible>
          <div id="inspector-content"></div>
        </calcite-block>

        <!-- Legend Block -->
        <calcite-block heading="Legend" open icon-start="legend" collapsible>
          <calcite-list selection-mode="none" id="legend-list"></calcite-list>
        </calcite-block>

      </calcite-panel>
    </calcite-shell-panel>

    <!-- ═══ Main: Map ═══ -->
    <calcite-panel id="map-container">
      <calcite-action id="btn-open-graph" text="Open Link Chart" icon="link-chart-expand" slot="header-actions-end"></calcite-action>
      <arcgis-map id="geo-map" basemap="dark-gray-vector" zoom="2" center="20, 25" popup-disabled>
        <arcgis-zoom position="top-left"></arcgis-zoom>
        <arcgis-popup slot="popup"></arcgis-popup>
      </arcgis-map>
    </calcite-panel>

    <!-- ═══ Bottom: Link Chart (Graph Canvas) ═══ -->
    <calcite-shell-panel id="bottom-shell-panel" slot="panel-bottom" position="end" layout="horizontal" collapsed>
      <calcite-panel heading="Link Chart" description="Force-directed network topology" scale="s" closable id="link-chart-panel">
        <calcite-action text="Re-layout" icon="refresh" slot="header-actions-end" id="btn-relayout" scale="s"></calcite-action>
        <calcite-action text="Fit Extent" icon="zoom-to-object" slot="header-actions-end" id="btn-fit-extent" scale="s"></calcite-action>
        <arcgis-map id="link-chart-map" popup-disabled>
          <arcgis-zoom position="top-right" scale="s"></arcgis-zoom>
          <arcgis-popup slot="popup"></arcgis-popup>
        </arcgis-map>
      </calcite-panel>
    </calcite-shell-panel>

  </calcite-shell>

  <script type="module">
    // ═══════════════════════════════════════════════════════════════
    //  DATA
    // ═══════════════════════════════════════════════════════════════
    const TYPES = {
      factory:   { color: [239, 68, 68],  hex: "#ef4444", label: "Factory",   markerStyle: "diamond" },
      warehouse: { color: [56, 189, 248], hex: "#38bdf8", label: "Warehouse", markerStyle: "circle" },
      port:      { color: [34, 197, 94],  hex: "#22c55e", label: "Port",      markerStyle: "triangle" },
      supplier:  { color: [245, 158, 11], hex: "#f59e0b", label: "Supplier",  markerStyle: "square" },
      retailer:  { color: [167, 139, 250],hex: "#a78bfa", label: "Retailer",  markerStyle: "circle" },
    };

    const nodes = [
      { id: "f1", name: "Shenzhen Factory",    type: "factory",   lat: 22.543,  lon: 114.058, country: "China",       capacity: 50000 },
      { id: "f2", name: "Detroit Assembly",     type: "factory",   lat: 42.331,  lon: -83.046, country: "USA",         capacity: 30000 },
      { id: "f3", name: "Stuttgart Plant",      type: "factory",   lat: 48.775,  lon: 9.182,   country: "Germany",     capacity: 25000 },
      { id: "f4", name: "Chennai Factory",      type: "factory",   lat: 13.083,  lon: 80.270,  country: "India",       capacity: 40000 },
      { id: "f5", name: "Monterrey Plant",      type: "factory",   lat: 25.687,  lon: -100.317,country: "Mexico",      capacity: 20000 },
      { id: "w1", name: "Rotterdam Hub",        type: "warehouse", lat: 51.924,  lon: 4.477,   country: "Netherlands", capacity: 80000 },
      { id: "w2", name: "Singapore Logistics",  type: "warehouse", lat: 1.352,   lon: 103.820, country: "Singapore",   capacity: 60000 },
      { id: "w3", name: "Memphis Distribution", type: "warehouse", lat: 35.149,  lon: -90.049, country: "USA",         capacity: 70000 },
      { id: "w4", name: "Dubai Logistics",      type: "warehouse", lat: 25.276,  lon: 55.296,  country: "UAE",         capacity: 55000 },
      { id: "p1", name: "Shanghai Port",        type: "port",      lat: 31.230,  lon: 121.474, country: "China",       capacity: 43000 },
      { id: "p2", name: "Los Angeles Port",     type: "port",      lat: 33.740,  lon: -118.260,country: "USA",         capacity: 20000 },
      { id: "p3", name: "Hamburg Port",          type: "port",      lat: 53.551,  lon: 9.994,   country: "Germany",     capacity: 18000 },
      { id: "p4", name: "Mumbai Port",           type: "port",      lat: 19.076,  lon: 72.878,  country: "India",       capacity: 15000 },
      { id: "s1", name: "Taiwan Semiconductor", type: "supplier",  lat: 24.799,  lon: 120.979, country: "Taiwan",      capacity: 10000 },
      { id: "s2", name: "Korean Electronics",   type: "supplier",  lat: 37.566,  lon: 126.978, country: "South Korea", capacity: 12000 },
      { id: "s3", name: "Brazilian Raw Mat.",    type: "supplier",  lat: -23.550, lon: -46.633, country: "Brazil",      capacity: 8000 },
      { id: "s4", name: "Australian Minerals",  type: "supplier",  lat: -33.868, lon: 151.209, country: "Australia",   capacity: 9000 },
      { id: "r1", name: "NYC Retail Center",    type: "retailer",  lat: 40.713,  lon: -74.006, country: "USA",         capacity: 5000 },
      { id: "r2", name: "London Retail Hub",     type: "retailer",  lat: 51.507,  lon: -0.128,  country: "UK",          capacity: 4500 },
      { id: "r3", name: "Tokyo Retail Center",  type: "retailer",  lat: 35.689,  lon: 139.692, country: "Japan",       capacity: 6000 },
      { id: "r4", name: "Sao Paulo Retail",     type: "retailer",  lat: -23.533, lon: -46.625, country: "Brazil",      capacity: 3500 },
    ];

    const links = [
      { source: "s1", target: "f1", type: "supplies", volume: 8000 },
      { source: "s2", target: "f1", type: "supplies", volume: 6000 },
      { source: "s1", target: "f4", type: "supplies", volume: 4000 },
      { source: "s3", target: "f5", type: "supplies", volume: 3000 },
      { source: "s4", target: "f4", type: "supplies", volume: 5000 },
      { source: "s2", target: "f3", type: "supplies", volume: 7000 },
      { source: "f1", target: "p1", type: "ships",    volume: 20000 },
      { source: "f3", target: "p3", type: "ships",    volume: 12000 },
      { source: "f4", target: "p4", type: "ships",    volume: 15000 },
      { source: "f2", target: "p2", type: "ships",    volume: 10000 },
      { source: "f5", target: "p2", type: "ships",    volume: 8000 },
      { source: "p1", target: "w2", type: "transit",  volume: 18000 },
      { source: "p1", target: "w4", type: "transit",  volume: 10000 },
      { source: "p2", target: "w3", type: "transit",  volume: 16000 },
      { source: "p3", target: "w1", type: "transit",  volume: 14000 },
      { source: "p4", target: "w4", type: "transit",  volume: 12000 },
      { source: "p4", target: "w2", type: "transit",  volume: 8000 },
      { source: "w1", target: "r2", type: "delivers", volume: 9000 },
      { source: "w2", target: "r3", type: "delivers", volume: 11000 },
      { source: "w3", target: "r1", type: "delivers", volume: 13000 },
      { source: "w4", target: "r2", type: "delivers", volume: 5000 },
      { source: "w3", target: "r4", type: "delivers", volume: 6000 },
      { source: "w1", target: "r3", type: "delivers", volume: 4000 },
      { source: "f1", target: "w2", type: "direct",   volume: 5000 },
      { source: "f2", target: "w3", type: "direct",   volume: 7000 },
      { source: "w2", target: "w4", type: "transfer", volume: 3000 },
      { source: "w1", target: "w3", type: "transfer", volume: 2000 },
    ];

    // ═══════════════════════════════════════════════════════════════
    //  GRAPH ALGORITHMS
    // ═══════════════════════════════════════════════════════════════
    function buildAdj(nodes, links) {
      const adj = new Map();
      nodes.forEach(n => adj.set(n.id, []));
      links.forEach(l => { adj.get(l.source)?.push(l.target); adj.get(l.target)?.push(l.source); });
      return adj;
    }

    function degreeCentrality(nodes, links) {
      const adj = buildAdj(nodes, links);
      const scores = new Map();
      const m = nodes.length - 1;
      adj.forEach((nb, id) => scores.set(id, nb.length / m));
      return scores;
    }

    function pageRank(nodes, links, d = 0.85, iter = 30) {
      const adj = buildAdj(nodes, links);
      const n = nodes.length;
      let ranks = new Map();
      nodes.forEach(nd => ranks.set(nd.id, 1 / n));
      for (let i = 0; i < iter; i++) {
        const nr = new Map();
        let dSum = 0;
        nodes.forEach(nd => { if (!adj.get(nd.id).length) dSum += ranks.get(nd.id); });
        nodes.forEach(nd => {
          let s = dSum / n;
          adj.forEach((nbs, sid) => { if (nbs.includes(nd.id)) s += ranks.get(sid) / nbs.length; });
          nr.set(nd.id, (1 - d) / n + d * s);
        });
        ranks = nr;
      }
      return ranks;
    }

    function betweenness(nodes, links) {
      const adj = buildAdj(nodes, links);
      const sc = new Map();
      nodes.forEach(n => sc.set(n.id, 0));
      nodes.forEach(src => {
        const stk = [], pred = new Map(), sig = new Map(), dist = new Map(), del = new Map();
        nodes.forEach(n => { pred.set(n.id, []); sig.set(n.id, 0); dist.set(n.id, -1); del.set(n.id, 0); });
        sig.set(src.id, 1); dist.set(src.id, 0);
        const q = [src.id];
        while (q.length) {
          const v = q.shift(); stk.push(v);
          for (const w of adj.get(v)) {
            if (dist.get(w) < 0) { q.push(w); dist.set(w, dist.get(v) + 1); }
            if (dist.get(w) === dist.get(v) + 1) { sig.set(w, sig.get(w) + sig.get(v)); pred.get(w).push(v); }
          }
        }
        while (stk.length) {
          const w = stk.pop();
          for (const v of pred.get(w)) del.set(v, del.get(v) + (sig.get(v) / sig.get(w)) * (1 + del.get(w)));
          if (w !== src.id) sc.set(w, sc.get(w) + del.get(w));
        }
      });
      const norm = (nodes.length - 1) * (nodes.length - 2);
      if (norm > 0) sc.forEach((v, k) => sc.set(k, v / norm));
      return sc;
    }

    function communityDetect(nodes, links, iter = 15) {
      const adj = buildAdj(nodes, links);
      const labels = new Map();
      nodes.forEach(n => labels.set(n.id, n.id));
      for (let i = 0; i < iter; i++) {
        const order = [...nodes].sort(() => Math.random() - 0.5);
        let changed = false;
        for (const node of order) {
          const nbs = adj.get(node.id); if (!nbs.length) continue;
          const freq = new Map();
          for (const nb of nbs) { const l = labels.get(nb); freq.set(l, (freq.get(l) || 0) + 1); }
          let mx = 0, ml = labels.get(node.id);
          freq.forEach((c, l) => { if (c > mx) { mx = c; ml = l; } });
          if (ml !== labels.get(node.id)) { labels.set(node.id, ml); changed = true; }
        }
        if (!changed) break;
      }
      const comms = new Map();
      labels.forEach((l, id) => { if (!comms.has(l)) comms.set(l, new Set()); comms.get(l).add(id); });
      return { labels, communities: [...comms.values()] };
    }

    function shortestPath(nodes, links, src, tgt) {
      const adj = buildAdj(nodes, links);
      const vis = new Set([src]);
      const q = [[src]];
      while (q.length) {
        const path = q.shift();
        if (path[path.length - 1] === tgt) return path;
        for (const nb of adj.get(path[path.length - 1]) || []) {
          if (!vis.has(nb)) { vis.add(nb); q.push([...path, nb]); }
        }
      }
      return null;
    }

    function density(n, e) { return n < 2 ? 0 : (2 * e) / (n * (n - 1)); }

    // ═══════════════════════════════════════════════════════════════
    //  FORCE-DIRECTED LAYOUT (vanilla JS, no D3)
    // ═══════════════════════════════════════════════════════════════
    function forceLayout(nodes, links, { width = 800, height = 600, iterations = 200 } = {}) {
      // Initialize random positions
      const pos = new Map();
      nodes.forEach(n => {
        pos.set(n.id, { x: width * 0.2 + Math.random() * width * 0.6, y: height * 0.2 + Math.random() * height * 0.6, vx: 0, vy: 0 });
      });

      const adj = buildAdj(nodes, links);
      const linkDist = 100;
      const repulsion = -400;
      const gravity = 0.02;
      const damping = 0.9;
      const cx = width / 2, cy = height / 2;

      for (let iter = 0; iter < iterations; iter++) {
        const alpha = 1 - iter / iterations;
        const strength = alpha * 0.1;

        // Repulsion (all pairs)
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = pos.get(nodes[i].id), b = pos.get(nodes[j].id);
            let dx = b.x - a.x, dy = b.y - a.y;
            let dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const force = repulsion * alpha / (dist * dist);
            const fx = (dx / dist) * force, fy = (dy / dist) * force;
            a.vx -= fx; a.vy -= fy;
            b.vx += fx; b.vy += fy;
          }
        }

        // Attraction (links)
        links.forEach(l => {
          const a = pos.get(l.source), b = pos.get(l.target);
          if (!a || !b) return;
          let dx = b.x - a.x, dy = b.y - a.y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = (dist - linkDist) * 0.06 * alpha;
          const fx = (dx / dist) * force, fy = (dy / dist) * force;
          a.vx += fx; a.vy += fy;
          b.vx -= fx; b.vy -= fy;
        });

        // Gravity toward center
        nodes.forEach(n => {
          const p = pos.get(n.id);
          p.vx += (cx - p.x) * gravity * alpha;
          p.vy += (cy - p.y) * gravity * alpha;
        });

        // Apply velocity
        nodes.forEach(n => {
          const p = pos.get(n.id);
          p.vx *= damping;
          p.vy *= damping;
          p.x += p.vx;
          p.y += p.vy;
        });
      }

      return pos;
    }

    // ═══════════════════════════════════════════════════════════════
    //  IMPORT ARCGIS MODULES
    // ═══════════════════════════════════════════════════════════════
    const [
      GraphicsLayer, Graphic, SimpleMarkerSymbol, SimpleLineSymbol,
      TextSymbol, Point, Polyline, Extent, SpatialReference, Basemap,
      reactiveUtils
    ] = await $arcgis.import([
      "@arcgis/core/layers/GraphicsLayer.js",
      "@arcgis/core/Graphic.js",
      "@arcgis/core/symbols/SimpleMarkerSymbol.js",
      "@arcgis/core/symbols/SimpleLineSymbol.js",
      "@arcgis/core/symbols/TextSymbol.js",
      "@arcgis/core/geometry/Point.js",
      "@arcgis/core/geometry/Polyline.js",
      "@arcgis/core/geometry/Extent.js",
      "@arcgis/core/geometry/SpatialReference.js",
      "@arcgis/core/Basemap.js",
      "@arcgis/core/core/reactiveUtils.js",
    ]);

    // ═══════════════════════════════════════════════════════════════
    //  GEOGRAPHIC MAP SETUP
    // ═══════════════════════════════════════════════════════════════
    const geoMapEl = document.getElementById("geo-map");
    const geoPopup = geoMapEl.querySelector("arcgis-popup");
    await geoMapEl.viewOnReady();
    await geoPopup.componentOnReady();
    const geoView = geoMapEl.view;

    const geoLinkLayer = new GraphicsLayer({ title: "Routes", effect: "bloom(1, 0.5px, 0.1)" });
    const geoHighlightLayer = new GraphicsLayer({ title: "Highlights" });
    const geoNodeLayer = new GraphicsLayer({ title: "Nodes" });
    const geoLabelLayer = new GraphicsLayer({ title: "Labels" });
    geoView.map.addMany([geoLinkLayer, geoHighlightLayer, geoNodeLayer, geoLabelLayer]);

    // Draw geographic nodes
    const geoNodeGraphics = new Map();
    nodes.forEach(node => {
      const cfg = TYPES[node.type];
      const sz = Math.max(10, Math.min(22, 8 + Math.log2(node.capacity) * 1.2));
      const g = new Graphic({
        geometry: new Point({ longitude: node.lon, latitude: node.lat }),
        symbol: new SimpleMarkerSymbol({ color: cfg.color, size: sz, outline: { color: [15, 23, 42], width: 2 }, style: cfg.markerStyle }),
        attributes: { ...node, nodeId: node.id },
      });
      geoNodeLayer.add(g);
      geoNodeGraphics.set(node.id, g);

      geoLabelLayer.add(new Graphic({
        geometry: new Point({ longitude: node.lon, latitude: node.lat }),
        symbol: new TextSymbol({ text: node.name, color: [226, 232, 240], haloColor: [15, 23, 42], haloSize: 2, font: { size: 9, weight: "bold" }, yoffset: -14 }),
      }));
    });

    // Draw geographic links
    function drawGeoLinks() {
      geoLinkLayer.removeAll();
      links.forEach(link => {
        const sn = nodes.find(n => n.id === link.source);
        const tn = nodes.find(n => n.id === link.target);
        if (!sn || !tn) return;
        const w = Math.max(1, Math.min(4, link.volume / 5000));
        const c = link.type === "supplies" ? [245,158,11] : link.type === "ships" ? [239,68,68] :
                  link.type === "transit" ? [34,197,94] : link.type === "delivers" ? [167,139,250] :
                  link.type === "direct" ? [249,115,22] : [100,116,139];
        geoLinkLayer.add(new Graphic({
          geometry: new Polyline({ paths: [[[sn.lon, sn.lat], [tn.lon, tn.lat]]] }),
          symbol: new SimpleLineSymbol({ color: [...c, 180], width: w, style: link.type === "transfer" ? "dash" : "solid" }),
        }));
      });
    }
    drawGeoLinks();

    // Map click handler
    geoMapEl.addEventListener("arcgisViewClick", async (event) => {
      const hit = await geoView.hitTest(event.detail);
      const result = hit.results.find(r => r.graphic?.attributes?.nodeId);
      if (result) {
        const nodeId = result.graphic.attributes.nodeId;
        highlightNode(nodeId);
        const attr = result.graphic.attributes;
        const adj = buildAdj(nodes, links);
        geoPopup.location = result.mapPoint;
        geoPopup.heading = attr.name;
        geoPopup.content = `<div style="font-size:13px; line-height:1.8">
          <b>${TYPES[attr.type].label}</b> &middot; ${attr.country}<br>
          Capacity: <b>${attr.capacity?.toLocaleString()}</b><br>
          Connections: <b>${adj.get(nodeId)?.length || 0}</b>
        </div>`;
        geoPopup.open = true;
      } else {
        geoPopup.open = false;
        clearHighlights();
      }
    });

    // ═══════════════════════════════════════════════════════════════
    //  LINK CHART (second arcgis-map, no basemap)
    // ═══════════════════════════════════════════════════════════════
    const lcMapEl = document.getElementById("link-chart-map");
    const lcPopup = lcMapEl.querySelector("arcgis-popup");
    await lcMapEl.viewOnReady();
    await lcPopup.componentOnReady();
    const lcView = lcMapEl.view;

    // Remove basemap → dark canvas
    lcView.map.basemap = null;
    lcView.background = { color: [15, 23, 42, 1] };
    lcView.navigation = { mouseWheelZoomEnabled: true, browserTouchPanEnabled: true };
    lcView.constraints = { snapToZoom: false, minZoom: 0, maxZoom: 24 };
    lcView.ui.components = [];

    const lcEdgeLayer = new GraphicsLayer({ title: "Edges", effect: "bloom(0.8, 0.5px, 0.05)" });
    const lcHighlightLayer = new GraphicsLayer({ title: "Highlights" });
    const lcNodeLayer = new GraphicsLayer({ title: "Nodes" });
    const lcLabelLayer = new GraphicsLayer({ title: "Labels" });
    lcView.map.addMany([lcEdgeLayer, lcHighlightLayer, lcNodeLayer, lcLabelLayer]);

    // Run force layout
    const layoutW = 800, layoutH = 600;
    let layoutPos = forceLayout(nodes, links, { width: layoutW, height: layoutH, iterations: 300 });

    // Convert layout coords → geographic coords (small area near 0,0)
    // Map layout space [0, layoutW] → longitude [-0.04, 0.04] and [0, layoutH] → latitude [-0.03, 0.03]
    function toGeo(x, y) {
      return { lon: (x / layoutW - 0.5) * 0.08, lat: (y / layoutH - 0.5) * 0.06 };
    }

    const lcNodeGraphics = new Map();
    const lcEdgeGraphics = [];

    function renderLinkChart() {
      lcNodeLayer.removeAll();
      lcLabelLayer.removeAll();
      lcEdgeLayer.removeAll();
      lcNodeGraphics.clear();
      lcEdgeGraphics.length = 0;

      // Edges
      links.forEach(link => {
        const sp = layoutPos.get(link.source), tp = layoutPos.get(link.target);
        if (!sp || !tp) return;
        const sg = toGeo(sp.x, sp.y), tg = toGeo(tp.x, tp.y);
        const srcNode = nodes.find(n => n.id === link.source);
        const cfg = TYPES[srcNode?.type] || TYPES.warehouse;
        const w = Math.max(1.5, Math.min(4, link.volume / 5000));
        const edgeGraphic = new Graphic({
          geometry: new Polyline({ paths: [[[sg.lon, sg.lat], [tg.lon, tg.lat]]] }),
          symbol: new SimpleLineSymbol({ color: [...cfg.color, 120], width: w, style: link.type === "transfer" ? "dash" : "solid" }),
          attributes: { source: link.source, target: link.target, type: link.type, volume: link.volume },
        });
        lcEdgeLayer.add(edgeGraphic);
        lcEdgeGraphics.push(edgeGraphic);
      });

      // Nodes
      nodes.forEach(node => {
        const p = layoutPos.get(node.id);
        if (!p) return;
        const geo = toGeo(p.x, p.y);
        const cfg = TYPES[node.type];
        const sz = Math.max(14, Math.min(24, 10 + Math.log2(node.capacity) * 1));

        const g = new Graphic({
          geometry: new Point({ longitude: geo.lon, latitude: geo.lat }),
          symbol: new SimpleMarkerSymbol({
            color: cfg.color, size: sz,
            outline: { color: [255, 255, 255, 200], width: 2 },
            style: cfg.markerStyle,
          }),
          attributes: { ...node, nodeId: node.id },
        });
        lcNodeLayer.add(g);
        lcNodeGraphics.set(node.id, g);

        // Label
        lcLabelLayer.add(new Graphic({
          geometry: new Point({ longitude: geo.lon, latitude: geo.lat }),
          symbol: new TextSymbol({
            text: node.name.length > 18 ? node.name.slice(0, 16) + "..." : node.name,
            color: [203, 213, 225],
            haloColor: [15, 23, 42], haloSize: 2,
            font: { size: 9, weight: "bold" },
            yoffset: -16,
          }),
        }));
      });
    }

    renderLinkChart();

    // Fit link chart to extent
    function fitLinkChart() {
      const allPts = nodes.map(n => { const p = layoutPos.get(n.id); return toGeo(p.x, p.y); });
      const minLon = Math.min(...allPts.map(p => p.lon)) - 0.005;
      const maxLon = Math.max(...allPts.map(p => p.lon)) + 0.005;
      const minLat = Math.min(...allPts.map(p => p.lat)) - 0.004;
      const maxLat = Math.max(...allPts.map(p => p.lat)) + 0.004;
      lcView.goTo(new Extent({ xmin: minLon, ymin: minLat, xmax: maxLon, ymax: maxLat }), { duration: 500 });
    }

    // Link chart click
    lcMapEl.addEventListener("arcgisViewClick", async (event) => {
      const hit = await lcView.hitTest(event.detail);
      const result = hit.results.find(r => r.graphic?.attributes?.nodeId);
      if (result) {
        const nodeId = result.graphic.attributes.nodeId;
        highlightNode(nodeId);
        const attr = result.graphic.attributes;
        const adj = buildAdj(nodes, links);
        lcPopup.location = result.mapPoint;
        lcPopup.heading = attr.name;
        lcPopup.content = `<div style="font-size:13px; line-height:1.8">
          <b>${TYPES[attr.type].label}</b> &middot; ${attr.country}<br>
          Capacity: <b>${attr.capacity?.toLocaleString()}</b><br>
          Connections: <b>${adj.get(nodeId)?.length || 0}</b>
        </div>`;
        lcPopup.open = true;
      } else {
        lcPopup.open = false;
        clearHighlights();
      }
    });

    // ═══════════════════════════════════════════════════════════════
    //  CROSS-HIGHLIGHTING
    // ═══════════════════════════════════════════════════════════════
    let selectedNodes = [];

    function highlightNode(nodeId) {
      const node = nodes.find(n => n.id === nodeId);
      if (!node) return;

      const adj = buildAdj(nodes, links);
      const neighbors = new Set(adj.get(nodeId) || []);
      neighbors.add(nodeId);

      // Highlight on geo map
      geoHighlightLayer.removeAll();
      geoHighlightLayer.add(new Graphic({
        geometry: new Point({ longitude: node.lon, latitude: node.lat }),
        symbol: new SimpleMarkerSymbol({ color: [0, 0, 0, 0], size: 36, outline: { color: [56, 189, 248], width: 3 } }),
      }));
      geoView.goTo({ center: [node.lon, node.lat], zoom: Math.max(geoView.zoom, 4) }, { duration: 600 });

      // Feature effect on geo nodes
      geoNodeLayer.graphics.forEach(g => {
        const nid = g.attributes?.nodeId;
        if (!nid) return;
        const cfg = TYPES[g.attributes.type];
        const isActive = neighbors.has(nid);
        const isPrimary = nid === nodeId;
        g.symbol = new SimpleMarkerSymbol({
          color: isActive ? cfg.color : [...cfg.color.slice(0, 3), 40],
          size: isPrimary ? 24 : isActive ? g.symbol.size : 8,
          outline: { color: isPrimary ? [56, 189, 248] : isActive ? [255, 255, 255, 200] : [15, 23, 42, 80], width: isPrimary ? 3 : 2 },
          style: cfg.markerStyle,
        });
      });

      // Highlight link chart nodes
      lcHighlightLayer.removeAll();
      const p = layoutPos.get(nodeId);
      if (p) {
        const geo = toGeo(p.x, p.y);
        lcHighlightLayer.add(new Graphic({
          geometry: new Point({ longitude: geo.lon, latitude: geo.lat }),
          symbol: new SimpleMarkerSymbol({ color: [0, 0, 0, 0], size: 36, outline: { color: [56, 189, 248], width: 3 } }),
        }));
      }

      lcNodeLayer.graphics.forEach(g => {
        const nid = g.attributes?.nodeId;
        if (!nid) return;
        const cfg = TYPES[g.attributes.type];
        const isActive = neighbors.has(nid);
        const isPrimary = nid === nodeId;
        const sz = Math.max(14, Math.min(24, 10 + Math.log2(g.attributes.capacity) * 1));
        g.symbol = new SimpleMarkerSymbol({
          color: isActive ? cfg.color : [...cfg.color.slice(0, 3), 40],
          size: isPrimary ? 28 : isActive ? sz : 10,
          outline: { color: isPrimary ? [56, 189, 248] : isActive ? [255, 255, 255, 200] : [15, 23, 42, 50], width: isPrimary ? 3 : 2 },
          style: cfg.markerStyle,
        });
      });

      // Dim non-connected edges
      lcEdgeGraphics.forEach(g => {
        const s = g.attributes.source, t = g.attributes.target;
        const isConn = s === nodeId || t === nodeId;
        const srcNode = nodes.find(n => n.id === s);
        const cfg = TYPES[srcNode?.type] || TYPES.warehouse;
        g.symbol = new SimpleLineSymbol({
          color: isConn ? [...cfg.color, 220] : [...cfg.color.slice(0, 3), 20],
          width: isConn ? Math.max(2.5, g.attributes.volume / 4000) : 1,
          style: g.attributes.type === "transfer" ? "dash" : "solid",
        });
      });

      // Update inspector
      updateInspector(nodeId);

      selectedNodes.push(nodeId);
      if (selectedNodes.length > 2) selectedNodes = selectedNodes.slice(-2);
    }

    function clearHighlights() {
      geoHighlightLayer.removeAll();
      lcHighlightLayer.removeAll();

      // Restore geo nodes
      geoNodeLayer.graphics.forEach(g => {
        const nid = g.attributes?.nodeId;
        if (!nid) return;
        const cfg = TYPES[g.attributes.type];
        const sz = Math.max(10, Math.min(22, 8 + Math.log2(g.attributes.capacity) * 1.2));
        g.symbol = new SimpleMarkerSymbol({ color: cfg.color, size: sz, outline: { color: [15, 23, 42], width: 2 }, style: cfg.markerStyle });
      });

      // Restore LC nodes
      lcNodeLayer.graphics.forEach(g => {
        const nid = g.attributes?.nodeId;
        if (!nid) return;
        const cfg = TYPES[g.attributes.type];
        const sz = Math.max(14, Math.min(24, 10 + Math.log2(g.attributes.capacity) * 1));
        g.symbol = new SimpleMarkerSymbol({ color: cfg.color, size: sz, outline: { color: [255, 255, 255, 200], width: 2 }, style: cfg.markerStyle });
      });

      // Restore LC edges
      lcEdgeGraphics.forEach(g => {
        const srcNode = nodes.find(n => n.id === g.attributes.source);
        const cfg = TYPES[srcNode?.type] || TYPES.warehouse;
        g.symbol = new SimpleLineSymbol({
          color: [...cfg.color, 120], width: Math.max(1.5, Math.min(4, g.attributes.volume / 5000)),
          style: g.attributes.type === "transfer" ? "dash" : "solid",
        });
      });

      document.getElementById("inspector-content").innerHTML = "";
      document.getElementById("inspector-block").description = "Click a node to inspect";
    }

    // ═══════════════════════════════════════════════════════════════
    //  INSPECTOR
    // ═══════════════════════════════════════════════════════════════
    function updateInspector(nodeId) {
      const node = nodes.find(n => n.id === nodeId);
      if (!node) return;
      const adj = buildAdj(nodes, links);
      const degree = adj.get(nodeId)?.length || 0;
      const pr = pageRank(nodes, links);
      const bc = betweenness(nodes, links);
      const inL = links.filter(l => l.target === nodeId);
      const outL = links.filter(l => l.source === nodeId);
      const vol = [...inL, ...outL].reduce((s, l) => s + l.volume, 0);

      const block = document.getElementById("inspector-block");
      block.heading = node.name;
      block.description = `${TYPES[node.type].label} - ${node.country}`;
      block.open = true;

      document.getElementById("inspector-content").innerHTML = `
        <calcite-list selection-mode="none">
          <calcite-list-item label="Capacity" description="${node.capacity.toLocaleString()} units"></calcite-list-item>
          <calcite-list-item label="Degree" description="${degree} connections"></calcite-list-item>
          <calcite-list-item label="In / Out" description="${inL.length} inbound, ${outL.length} outbound"></calcite-list-item>
          <calcite-list-item label="Total Volume" description="${vol.toLocaleString()} units"></calcite-list-item>
          <calcite-list-item label="PageRank" description="${pr.get(nodeId)?.toFixed(4)}"></calcite-list-item>
          <calcite-list-item label="Betweenness" description="${bc.get(nodeId)?.toFixed(4)}"></calcite-list-item>
        </calcite-list>
      `;
    }

    // ═══════════════════════════════════════════════════════════════
    //  ALGORITHMS
    // ═══════════════════════════════════════════════════════════════
    const communityHex = ["#ef4444", "#38bdf8", "#22c55e", "#f59e0b", "#a78bfa", "#14b8a6", "#f97316", "#64748b"];
    const communityRgb = [[239,68,68],[56,189,248],[34,197,94],[245,158,11],[167,139,250],[20,184,166],[249,115,22],[100,116,139]];
    let activeAlgo = null;

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return [r, g, b];
    }

    function applyAlgoSizing(scores) {
      const max = Math.max(...scores.values()) || 1;
      lcNodeLayer.graphics.forEach(g => {
        const nid = g.attributes?.nodeId; if (!nid) return;
        const cfg = TYPES[g.attributes.type];
        const ratio = scores.get(nid) / max;
        const sz = 10 + ratio * 28;
        g.symbol = new SimpleMarkerSymbol({ color: cfg.color, size: sz, outline: { color: [255,255,255, 200], width: 2 }, style: cfg.markerStyle });
      });
    }

    document.getElementById("algo-list").addEventListener("calciteListItemSelect", (event) => {
      const selected = event.target.value;

      if (activeAlgo === selected) {
        activeAlgo = null;
        clearHighlights();
        event.target.selected = false;
        return;
      }
      activeAlgo = selected;

      if (selected === "degree") applyAlgoSizing(degreeCentrality(nodes, links));
      else if (selected === "pagerank") applyAlgoSizing(pageRank(nodes, links));
      else if (selected === "betweenness") applyAlgoSizing(betweenness(nodes, links));
      else if (selected === "community") {
        const { labels, communities } = communityDetect(nodes, links);
        const labelToIdx = new Map(); let idx = 0;
        labels.forEach(l => { if (!labelToIdx.has(l)) labelToIdx.set(l, idx++); });
        lcNodeLayer.graphics.forEach(g => {
          const nid = g.attributes?.nodeId; if (!nid) return;
          const ci = labelToIdx.get(labels.get(nid)) % communityRgb.length;
          const sz = Math.max(14, Math.min(24, 10 + Math.log2(g.attributes.capacity) * 1));
          g.symbol = new SimpleMarkerSymbol({ color: communityRgb[ci], size: sz, outline: { color: [255,255,255, 200], width: 2 }, style: TYPES[g.attributes.type].markerStyle });
        });
        document.getElementById("inspector-content").innerHTML = `
          <calcite-notice open icon="group"><div slot="title">${communities.length} communities detected</div>
            <div slot="message">Nodes colored by label propagation clusters</div></calcite-notice>`;
        document.getElementById("inspector-block").open = true;
      }
      else if (selected === "shortest") {
        if (selectedNodes.length < 2) {
          document.getElementById("inspector-content").innerHTML = `
            <calcite-notice open icon="road-sign" kind="warning"><div slot="title">Select 2 nodes first</div>
              <div slot="message">Click 2 nodes on the map or link chart, then select Shortest Path</div></calcite-notice>`;
          document.getElementById("inspector-block").open = true;
          return;
        }
        const path = shortestPath(nodes, links, selectedNodes[selectedNodes.length - 2], selectedNodes[selectedNodes.length - 1]);
        if (!path) {
          document.getElementById("inspector-content").innerHTML = `
            <calcite-notice open kind="danger" icon="x-octagon"><div slot="title">No path found</div></calcite-notice>`;
          return;
        }
        const pathSet = new Set(path);

        // Highlight path in link chart
        lcNodeLayer.graphics.forEach(g => {
          const nid = g.attributes?.nodeId; if (!nid) return;
          const cfg = TYPES[g.attributes.type];
          const onPath = pathSet.has(nid);
          g.symbol = new SimpleMarkerSymbol({
            color: onPath ? [56, 189, 248] : [...cfg.color.slice(0,3), 30],
            size: onPath ? 22 : 8,
            outline: { color: onPath ? [255,255,255] : [15,23,42, 40], width: 2 },
            style: cfg.markerStyle,
          });
        });

        lcEdgeGraphics.forEach(g => {
          const s = g.attributes.source, t = g.attributes.target;
          let onPath = false;
          for (let i = 0; i < path.length - 1; i++) {
            if ((path[i] === s && path[i+1] === t) || (path[i] === t && path[i+1] === s)) { onPath = true; break; }
          }
          const srcNode = nodes.find(n => n.id === s);
          const cfg = TYPES[srcNode?.type] || TYPES.warehouse;
          g.symbol = new SimpleLineSymbol({
            color: onPath ? [56, 189, 248, 240] : [...cfg.color.slice(0,3), 15],
            width: onPath ? 4 : 1,
          });
        });

        // Highlight path on geo map
        geoHighlightLayer.removeAll();
        path.forEach(id => {
          const n = nodes.find(nd => nd.id === id);
          if (n) geoHighlightLayer.add(new Graphic({
            geometry: new Point({ longitude: n.lon, latitude: n.lat }),
            symbol: new SimpleMarkerSymbol({ color: [56, 189, 248], size: 18, outline: { color: [255,255,255], width: 2 } }),
          }));
        });

        document.getElementById("inspector-content").innerHTML = `
          <calcite-notice open icon="road-sign"><div slot="title">Path: ${path.length - 1} hops</div>
            <div slot="message">${path.map(id => nodes.find(n => n.id === id)?.name).join(" → ")}</div></calcite-notice>`;
        document.getElementById("inspector-block").open = true;
      }
    });

    // ═══════════════════════════════════════════════════════════════
    //  TOOLBAR
    // ═══════════════════════════════════════════════════════════════
    const bottomPanel = document.getElementById("bottom-shell-panel");
    const lcPanel = document.getElementById("link-chart-panel");
    let graphOpen = false;

    function openGraph() {
      bottomPanel.style.height = "55vh";
      bottomPanel.collapsed = false;
      lcPanel.closed = false;
      graphOpen = true;
      setTimeout(() => fitLinkChart(), 400);
    }

    function closeGraph() {
      bottomPanel.style.height = "0";
      bottomPanel.collapsed = true;
      lcPanel.closed = true;
      graphOpen = false;
    }

    document.getElementById("btn-open-graph").addEventListener("click", () => {
      if (graphOpen) closeGraph(); else openGraph();
    });

    lcPanel.addEventListener("calcitePanelClose", closeGraph);

    document.getElementById("btn-relayout").addEventListener("click", () => {
      layoutPos = forceLayout(nodes, links, { width: layoutW, height: layoutH, iterations: 300 });
      renderLinkChart();
      setTimeout(() => fitLinkChart(), 200);
    });

    document.getElementById("btn-fit-extent").addEventListener("click", fitLinkChart);

    document.getElementById("btn-toggle-routes").addEventListener("click", () => {
      geoLinkLayer.visible = !geoLinkLayer.visible;
    });

    document.getElementById("btn-reset-all").addEventListener("click", () => {
      activeAlgo = null;
      selectedNodes = [];
      clearHighlights();
      geoPopup.open = false;
      lcPopup.open = false;
      geoView.goTo({ center: [20, 25], zoom: 2 }, { duration: 600 });
      if (graphOpen) fitLinkChart();
      document.querySelectorAll("#algo-list calcite-list-item").forEach(li => li.selected = false);
    });

    // ═══════════════════════════════════════════════════════════════
    //  LEGEND + STATS
    // ═══════════════════════════════════════════════════════════════
    const legendList = document.getElementById("legend-list");
    Object.entries(TYPES).forEach(([, cfg]) => {
      const li = document.createElement("calcite-list-item");
      li.label = cfg.label;
      li.description = cfg.markerStyle;
      const chip = document.createElement("calcite-chip");
      chip.slot = "content-start";
      chip.scale = "s";
      chip.style.cssText = `--calcite-chip-background-color: ${cfg.hex}; --calcite-chip-text-color: white; min-width: 16px;`;
      chip.innerHTML = "&nbsp;";
      li.appendChild(chip);
      legendList.appendChild(li);
    });

    document.getElementById("chip-nodes").innerText = nodes.length;
    document.getElementById("chip-edges").innerText = links.length;
    document.getElementById("chip-density").innerText = density(nodes.length, links.length).toFixed(3);

    // Auto-open the link chart on load
    setTimeout(openGraph, 800);
  </script>
</body>
</html>
